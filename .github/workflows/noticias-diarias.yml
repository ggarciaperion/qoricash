name: Noticias Diarias QoriCash

on:
  schedule:
    # 13:30 UTC = 8:30 AM Lima (UTC-5)
    - cron: '30 13 * * 1-5'
  workflow_dispatch: # lanzar manualmente desde GitHub si es necesario

jobs:
  publicar-noticias:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar y publicar noticias
        env:
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          UPSTASH_REDIS_REST_URL:  ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: python scripts/actualizar_noticias.py
