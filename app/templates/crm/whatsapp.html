{% extends "base.html" %}
{% block title %}CRM WhatsApp — QoriCash{% endblock %}

{% block head %}
<style>
  /* ── Layout ── */
  .crm-wrap {
    display: flex;
    height: calc(100vh - 70px);
    border-radius: 12px;
    overflow: hidden;
    background: var(--qori-gray-100, #f8f9fa);
    border: 1px solid var(--qori-gray-200, #e9ecef);
  }

  /* ── Lista conversaciones ── */
  .crm-sidebar {
    width: 320px;
    min-width: 280px;
    background: #fff;
    border-right: 1px solid #e9ecef;
    display: flex;
    flex-direction: column;
  }
  .crm-sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #e9ecef;
    background: #0D1B2A;
  }
  .crm-sidebar-header h6 {
    color: #fff;
    margin: 0;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .crm-search {
    padding: 10px 12px;
    border-bottom: 1px solid #f1f3f5;
  }
  .crm-search input {
    border-radius: 20px;
    font-size: 0.82rem;
    background: #f8f9fa;
    border: 1px solid #e9ecef;
    padding: 6px 14px;
  }
  .crm-conv-list {
    flex: 1;
    overflow-y: auto;
  }
  .crm-conv-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    border-bottom: 1px solid #f8f9fa;
    transition: background .15s;
  }
  .crm-conv-item:hover   { background: #f8f9fa; }
  .crm-conv-item.active  { background: rgba(0,222,168,.08); border-left: 3px solid #00DEA8; }
  .crm-conv-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #0D1B2A;
    display: flex; align-items: center; justify-content: center;
    color: #00DEA8;
    font-weight: 700;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .crm-conv-info { flex: 1; min-width: 0; }
  .crm-conv-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: #1e293b;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .crm-conv-preview {
    font-size: 0.75rem;
    color: #94a3b8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .crm-conv-meta {
    text-align: right;
    flex-shrink: 0;
  }
  .crm-conv-time { font-size: 0.7rem; color: #94a3b8; }
  .crm-badge {
    background: #00DEA8;
    color: #0D1B2A;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-top: 2px;
    display: inline-block;
  }
  .crm-estado {
    font-size: 0.62rem;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    margin-top: 2px;
    display: inline-block;
  }
  .crm-estado.respondio  { background: #dcfce7; color: #16a34a; }
  .crm-estado.contactado { background: #fef9c3; color: #a16207; }
  .crm-estado.nuevo      { background: #f1f5f9; color: #64748b; }

  /* ── Chat area ── */
  .crm-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .crm-chat-header {
    padding: 14px 20px;
    background: #fff;
    border-bottom: 1px solid #e9ecef;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .crm-chat-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #0D1B2A;
    display: flex; align-items: center; justify-content: center;
    color: #00DEA8;
    font-weight: 700;
    font-size: 0.95rem;
  }
  .crm-chat-name  { font-weight: 700; font-size: 0.9rem; color: #1e293b; }
  .crm-chat-num   { font-size: 0.75rem; color: #94a3b8; }
  .crm-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #f0f2f5;
  }
  .crm-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    background: #f0f2f5;
  }
  .crm-empty i { font-size: 3rem; color: #cbd5e1; margin-bottom: 12px; }

  /* ── Burbujas ── */
  .crm-bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .crm-bubble-wrap.saliente { flex-direction: row-reverse; }
  .crm-bubble {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.45;
    word-break: break-word;
  }
  .crm-bubble.entrante {
    background: #fff;
    color: #1e293b;
    border-bottom-left-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
  }
  .crm-bubble.saliente {
    background: #00DEA8;
    color: #0D1B2A;
    border-bottom-right-radius: 3px;
    font-weight: 500;
  }
  .crm-bubble-time {
    font-size: 0.68rem;
    color: #94a3b8;
    margin-top: 2px;
    text-align: right;
  }
  .crm-bubble.saliente + .crm-bubble-time { color: rgba(13,27,42,.5); }

  /* ── Media ── */
  .crm-media-img {
    max-width: 240px; max-height: 280px;
    border-radius: 10px; display: block;
    cursor: zoom-in; object-fit: cover;
  }
  .crm-sticker {
    max-width: 120px; max-height: 120px;
    background: transparent; object-fit: contain;
  }
  .crm-media-caption {
    font-size: .8rem; color: #cbd5e1; margin-top: 4px;
  }
  .crm-media-audio {
    display: block; width: 220px; margin: 2px 0;
    filter: invert(0.85) hue-rotate(180deg); /* dark theme */
  }
  .crm-media-video {
    max-width: 240px; max-height: 220px;
    border-radius: 10px; display: block;
  }
  .crm-media-doc {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 10px; border-radius: 8px;
    background: rgba(255,255,255,.08); color: #e2e8f0;
    text-decoration: none; font-size: .85rem;
    border: 1px solid rgba(255,255,255,.12);
  }
  .crm-media-doc:hover { background: rgba(255,255,255,.14); color: #fff; }
  .crm-bubble.saliente .crm-media-doc {
    background: rgba(13,27,42,.12); color: #0d1b2a;
    border-color: rgba(13,27,42,.2);
  }
  .crm-bubble.saliente .crm-media-doc:hover { background: rgba(13,27,42,.2); }

  /* ── Input reply ── */
  .crm-reply {
    padding: 12px 16px;
    background: #fff;
    border-top: 1px solid #e9ecef;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .crm-reply textarea {
    flex: 1;
    border-radius: 20px;
    border: 1px solid #e9ecef;
    padding: 9px 16px;
    font-size: 0.85rem;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.4;
    background: #f8f9fa;
  }
  .crm-reply textarea:focus {
    outline: none;
    border-color: #00DEA8;
    background: #fff;
  }
  .btn-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #00DEA8;
    color: #0D1B2A;
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    transition: background .15s;
  }
  .btn-send:hover { background: #00FFAA; }
  .btn-send:disabled { background: #e9ecef; color: #94a3b8; }

  /* ── Scrollbar ── */
  .crm-conv-list::-webkit-scrollbar,
  .crm-messages::-webkit-scrollbar { width: 4px; }
  .crm-conv-list::-webkit-scrollbar-thumb,
  .crm-messages::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-3 px-3 px-md-4">
  <div class="d-flex align-items-center mb-3 gap-2">
    <i class="bi bi-whatsapp fs-5" style="color:#25D366;"></i>
    <h5 class="mb-0 fw-bold">CRM WhatsApp</h5>
    <span class="badge ms-1" id="totalBadge" style="background:#00DEA8;color:#0D1B2A;display:none;"></span>
  </div>

  <div class="crm-wrap">
    <!-- Sidebar conversaciones -->
    <div class="crm-sidebar">
      <div class="crm-sidebar-header">
        <h6><i class="bi bi-chat-dots me-2"></i>Conversaciones</h6>
      </div>
      <div class="crm-search">
        <input type="text" id="searchInput" class="form-control" placeholder="Buscar...">
      </div>
      <div class="crm-conv-list" id="convList">
        <div class="text-center text-muted py-4" style="font-size:.82rem;">
          <i class="bi bi-arrow-clockwise spin me-1"></i> Cargando...
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="crm-chat">
      <!-- Header (oculto hasta seleccionar) -->
      <div class="crm-chat-header" id="chatHeader" style="display:none!important;">
        <div class="crm-chat-avatar" id="chatAvatar">?</div>
        <div>
          <div class="crm-chat-name" id="chatName">—</div>
          <div class="crm-chat-num"  id="chatNum">—</div>
        </div>
      </div>

      <!-- Mensajes -->
      <div class="crm-messages" id="chatMessages">
        <div class="crm-empty" id="emptyState">
          <i class="bi bi-chat-square-dots"></i>
          <div style="font-size:.9rem;font-weight:600;color:#64748b;">Selecciona una conversación</div>
          <div style="font-size:.78rem;margin-top:4px;">para ver los mensajes</div>
        </div>
      </div>

      <!-- Reply -->
      <div class="crm-reply" id="chatReply" style="display:none!important;">
        <textarea id="replyInput" rows="1" placeholder="Escribe un mensaje..."></textarea>
        <button class="btn-send" id="sendBtn" title="Enviar">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let activeNum = null;
let allConvs  = [];
let pollTimer = null;

// ── Cargar conversaciones ──────────────────────────────────────────
async function loadConversaciones() {
  try {
    const res = await fetch('/crm/api/conversaciones', { credentials: 'same-origin' });
    if (!res.ok) {
      document.getElementById('convList').innerHTML =
        `<div class="text-center text-danger py-4" style="font-size:.8rem;">Error ${res.status}: ${res.statusText}</div>`;
      return;
    }
    allConvs = await res.json();
  } catch(e) {
    document.getElementById('convList').innerHTML =
      `<div class="text-center text-danger py-4" style="font-size:.8rem;">Error: ${e.message}</div>`;
    return;
  }
  renderConvs(allConvs);

  const total = allConvs.reduce((s, c) => s + c.no_leidos, 0);
  const badge = document.getElementById('totalBadge');
  if (total > 0) {
    badge.textContent = total;
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function renderConvs(convs) {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const list = convs.filter(c =>
    c.nombre.toLowerCase().includes(q) ||
    c.numero.includes(q) ||
    c.empresa.toLowerCase().includes(q)
  );
  const el = document.getElementById('convList');
  if (!list.length) {
    el.innerHTML = '<div class="text-center text-muted py-4" style="font-size:.82rem;">Sin conversaciones</div>';
    return;
  }
  el.innerHTML = list.map(c => `
    <div class="crm-conv-item ${c.numero === activeNum ? 'active' : ''}"
         onclick="selectConv('${c.numero}', '${escHtml(c.nombre)}', '${escHtml(c.empresa)}')">
      <div class="crm-conv-avatar">${(c.nombre || c.numero).charAt(0).toUpperCase()}</div>
      <div class="crm-conv-info">
        <div class="crm-conv-name">${escHtml(c.nombre)}</div>
        <div class="crm-conv-preview">${c.direccion === 'saliente' ? '↗ ' : ''}${escHtml(c.ultimo)}</div>
      </div>
      <div class="crm-conv-meta">
        <div class="crm-conv-time">${c.hora}</div>
        ${c.no_leidos > 0
          ? `<span class="crm-badge">${c.no_leidos}</span>`
          : `<span class="crm-estado ${c.estado}">${estadoLabel(c.estado)}</span>`
        }
      </div>
    </div>`).join('');
}

// ── Seleccionar conversación ───────────────────────────────────────
async function selectConv(numero, nombre, empresa) {
  activeNum = numero;
  renderConvs(allConvs);

  document.getElementById('chatHeader').style.cssText = '';
  document.getElementById('chatReply').style.cssText  = '';
  document.getElementById('emptyState').style.display = 'none';

  const initial = (nombre || numero).charAt(0).toUpperCase();
  document.getElementById('chatAvatar').textContent = initial;
  document.getElementById('chatName').textContent   = nombre || numero;
  document.getElementById('chatNum').textContent    = numero + (empresa ? ` · ${empresa}` : '');

  // Mostrar skeleton inmediatamente
  const el = document.getElementById('chatMessages');
  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;padding:4px 0;">
    ${[70,45,80,55,65].map((w,i) => `
    <div class="crm-bubble-wrap ${i%2===0?'entrante':'saliente'}" style="opacity:.35;">
      <div class="crm-bubble ${i%2===0?'entrante':'saliente'}"
           style="width:${w}%;height:34px;border-radius:12px;background:${i%2===0?'#e2e8f0':'#b2f5e0'};"></div>
    </div>`).join('')}
  </div>`;

  // Cargar mensajes y refrescar badges en paralelo
  const [msgs] = await Promise.all([
    fetch(`/crm/api/mensajes/${encodeURIComponent(numero)}`).then(r => r.json()),
    loadConversaciones(),
  ]);
  if (activeNum === numero) renderMensajes(msgs);
}

async function loadMensajes(numero) {
  const msgs = await fetch(`/crm/api/mensajes/${encodeURIComponent(numero)}`).then(r => r.json());
  if (activeNum === numero) renderMensajes(msgs);
}

function renderBubbleContent(m) {
  const mid = m.media_id;
  const tipo = m.media_tipo;
  const url = mid ? `/crm/api/media/${mid}` : '';
  if (tipo === 'image' || tipo === 'sticker') {
    const label = m.mensaje && m.mensaje !== '[Imagen]' && m.mensaje !== '[Sticker]'
      ? `<div class="crm-media-caption">${escHtml(m.mensaje)}</div>` : '';
    return `<img class="crm-media-img${tipo === 'sticker' ? ' crm-sticker' : ''}"
      src="${url}" alt="${tipo}" loading="lazy"
      onclick="window.open('${url}','_blank')">${label}`;
  }
  if (tipo === 'audio') {
    return `<audio class="crm-media-audio" controls preload="none">
      <source src="${url}"><span style="color:#94a3b8;font-size:.8rem">🎤 Audio de voz</span>
    </audio>`;
  }
  if (tipo === 'video') {
    const caption = m.mensaje && m.mensaje !== '[Video]'
      ? `<div class="crm-media-caption">${escHtml(m.mensaje)}</div>` : '';
    return `<video class="crm-media-video" controls preload="none">
      <source src="${url}">
    </video>${caption}`;
  }
  if (tipo === 'document') {
    return `<a class="crm-media-doc" href="${url}" download="${escHtml(m.mensaje)}" target="_blank">
      <i class="bi bi-file-earmark-arrow-down"></i> ${escHtml(m.mensaje)}
    </a>`;
  }
  // Tarjeta de contacto compartida por WhatsApp
  if (m.mensaje && m.mensaje.startsWith('[CONTACTO:')) {
    try {
      const data = JSON.parse(m.mensaje.slice(10, -1));
      const phones = (data.phones || []).map(p =>
        `<a href="https://wa.me/${p.replace(/\D/g,'')}" target="_blank" style="color:#4ade80;text-decoration:none;">${escHtml(p)}</a>`
      ).join('<br>');
      const emails = (data.emails || []).map(e =>
        `<a href="mailto:${escHtml(e)}" style="color:#93c5fd;text-decoration:none;">${escHtml(e)}</a>`
      ).join('<br>');
      return `<div style="display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;min-width:180px;">
        <div style="font-size:1.5rem;line-height:1;">👤</div>
        <div>
          <div style="font-weight:700;font-size:.9rem;margin-bottom:3px;">${escHtml(data.name||'Contacto')}</div>
          ${phones ? `<div style="font-size:.78rem;margin-bottom:2px;">${phones}</div>` : ''}
          ${emails ? `<div style="font-size:.75rem;">${emails}</div>` : ''}
        </div>
      </div>`;
    } catch(e) { /* fallback */ }
  }
  return escHtml(m.mensaje);
}

function renderMensajes(msgs) {
  const el = document.getElementById('chatMessages');
  if (!msgs.length) {
    el.innerHTML = '<div style="text-align:center;color:#94a3b8;font-size:.8rem;margin-top:20px;">Sin mensajes aún</div>';
    return;
  }
  el.innerHTML = msgs.map(m => `
    <div class="crm-bubble-wrap ${m.direccion}">
      <div>
        <div class="crm-bubble ${m.direccion}">${renderBubbleContent(m)}</div>
        <div class="crm-bubble-time">${m.created_at}</div>
      </div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Enviar mensaje ─────────────────────────────────────────────────
document.getElementById('sendBtn').addEventListener('click', enviar);
document.getElementById('replyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});

async function enviar() {
  const input  = document.getElementById('replyInput');
  const texto  = input.value.trim();
  if (!texto || !activeNum) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  input.value  = '';

  const res = await fetch('/crm/api/enviar', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCsrf() },
    body:    JSON.stringify({ numero: activeNum, mensaje: texto }),
  });
  const data = await res.json();
  btn.disabled = false;

  if (data.ok) {
    await loadMensajes(activeNum);
  } else {
    alert('Error al enviar: ' + (data.error || 'Intenta de nuevo'));
  }
}

// ── Polling cada 5s ────────────────────────────────────────────────
function startPolling() {
  pollTimer = setInterval(() => {
    const tasks = [loadConversaciones()];
    if (activeNum) tasks.push(loadMensajes(activeNum));
    Promise.all(tasks);
  }, 5000);
}

// ── Búsqueda ───────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', () => renderConvs(allConvs));

// ── Helpers ────────────────────────────────────────────────────────
function estadoLabel(e) {
  return e === 'respondio' ? 'Respondió' : e === 'contactado' ? 'Contactado' : 'Nuevo';
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getCsrf() {
  return document.querySelector('meta[name="csrf-token"]')?.content || '';
}

// ── Init ───────────────────────────────────────────────────────────
loadConversaciones().then(startPolling);
</script>
{% endblock %}
