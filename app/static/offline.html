<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sin conexión — QoriCash</title>
  <meta name="theme-color" content="#0D1B2A">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1B2A;color:#fff}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center}
    .logo{width:72px;height:72px;border-radius:18px;margin-bottom:28px;object-fit:contain}
    .icon-wrap{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;animation:pulse 3s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    svg{width:36px;height:36px;opacity:.7}
    h1{font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-.3px}
    p{font-size:14px;color:rgba(255,255,255,.5);line-height:1.6;max-width:280px;margin:0 auto 32px}
    .btn{display:inline-flex;align-items:center;gap:8px;background:#16A34A;color:#fff;border:none;padding:14px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none}
    .btn:hover{background:#15803d;transform:translateY(-1px)}
    .status{margin-top:28px;display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.3)}
    .dot{width:7px;height:7px;border-radius:50%;background:#ef4444;animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .dot.online{background:#22c55e}
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 6s4-2 11-2 11 2 11 2"/>
      <path d="M1 18s4-2 11-2 11 2 11 2"/>
      <line x1="1" y1="6" x2="1" y2="18"/>
      <line x1="23" y1="6" x2="23" y2="18"/>
      <line x1="12" y1="4" x2="12" y2="20"/>
    </svg>
  </div>

  <h1>Sin conexión</h1>
  <p>Verifica tu conexión a internet para continuar operando en QoriCash.</p>

  <button class="btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.56"/>
    </svg>
    Reintentar
  </button>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Sin conexión</span>
  </div>

  <script>
    function updateStatus() {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.className = 'dot online';
        txt.textContent = 'Conexión restaurada — recargando...';
        setTimeout(() => window.location.href = '/', 1200);
      }
    }
    window.addEventListener('online', updateStatus);
    setInterval(updateStatus, 3000);
  </script>
</body>
</html>
